name: Deploy Worker

permissions:
  contents: read

on:
  workflow_run:
    workflows: ["Upstream Sync"]
    types:
      - completed

  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy _worker.js to Cloudflare
        run: |
          curl --fail \
            -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/workers/scripts/proxy" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -F 'metadata={"main_module":"_worker.js"};type=application/json' \
            -F 'file=@_worker.js;type=application/javascript'
